# Production overlay — use with base compose:
#   PRODUCTION_ENV_FILE=.env.production.smoke docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production.smoke up -d
#
# Only the reverse proxy is published externally. PostgreSQL and Redis stay internal.

x-logging: &prod-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  leadflow_public:
    driver: bridge
  leadflow_internal:
    driver: bridge
    internal: true

services:
  postgres:
    logging: *prod-logging
    networks:
      - leadflow_internal
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-leadflow}

  redis:
    logging: *prod-logging
    networks:
      - leadflow_internal
    ports: !reset []

  backend:
    logging: *prod-logging
    user: "1000:1000"
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    networks:
      - leadflow_internal
    ports: !reset []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    logging: *prod-logging
    user: "1000:1000"
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    networks:
      - leadflow_internal

  scheduler:
    logging: *prod-logging
    user: "1000:1000"
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    networks:
      - leadflow_internal

  frontend:
    logging: *prod-logging
    networks:
      - leadflow_internal
    ports: !reset []

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *prod-logging
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${PROXY_HTTP_PORT:-8080}:80"
    networks:
      - leadflow_public
      - leadflow_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/api/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
