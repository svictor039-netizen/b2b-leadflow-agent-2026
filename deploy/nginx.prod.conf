upstream leadflow_backend {
    server backend:8000;
}

upstream leadflow_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Forward request correlation id
    proxy_set_header X-Request-ID $http_x_request_id;

    location /api/ {
        proxy_pass http://leadflow_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /docs {
        proxy_pass http://leadflow_backend/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://leadflow_backend/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://leadflow_backend/openapi.json;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://leadflow_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

